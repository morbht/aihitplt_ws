version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      eslint-and-eslint-plugins:
        patterns:
          - "*eslint*"
          - "globals"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
